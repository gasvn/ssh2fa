name: Auto2FA
options:
  bundleIdPrefix: com.auto2fa
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    # NOTE: the bundle version actually shown/used comes from
    # Auto2FA/Resources/Info.plist (GENERATE_INFOPLIST_FILE: NO). Keep these in
    # sync with that file when cutting a release.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "100"
    SWIFT_VERSION: "5.10"
    PRODUCT_NAME: "Auto2FA"
    PRODUCT_BUNDLE_IDENTIFIER: "com.auto2fa.app"
    # Hardened runtime OFF for local ad-hoc builds — turning it on without
    # proper entitlements + a real Developer ID signing identity tends to
    # refuse to launch. Easy to flip back on once you sign the release.
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"            # ad-hoc signing for local dev
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Auto2FA/Resources/Info.plist
    SWIFT_STRICT_CONCURRENCY: minimal  # avoid the Swift 6 strict-concurrency wall in this scaffold
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    # Pin to a tag we've verified the API against. NotchPresenter.swift
    # depends on DynamicNotchInfo.Label(systemName:color:) and on the
    # expand()/hide() pair. Both exist in 1.0.0 (June 2025) and 1.1.0
    # (Feb 2026). If you want fancier animations, bump the `from`.
    from: 1.0.0

targets:
  Auto2FA:
    type: application
    platform: macOS
    sources:
      - path: Auto2FA
        excludes:
          - Resources/Info.plist     # referenced explicitly via INFOPLIST_FILE
    dependencies:
      - package: DynamicNotchKit
    info:
      # XcodeGen REGENERATES this Info.plist on every `xcodegen generate`, so
      # the bundle version must be declared HERE (editing the .plist directly
      # is reset on the next regenerate). This is the single source of truth
      # for the displayed/checked version — keep RELEASE.md in step.
      path: Auto2FA/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "100"

  Auto2FATests:
    type: bundle.unit-test
    platform: macOS
    sources:
      # Compile the pure core DIRECTLY into the test bundle (Foundation-only, no
      # app host) so tests run headlessly — the app never launches, so its
      # daemon-install / spawn side-effects never fire during `xcodebuild test`.
      - path: Auto2FATests
      - path: Auto2FA/SyncCore.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.auto2fa.tests

schemes:
  Auto2FATests:
    build:
      targets:
        Auto2FATests: [test]
    test:
      targets:
        - Auto2FATests
